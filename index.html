<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario Pro - Bodega</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="manifest.json">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
</head>
<body>
    <header>
        <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px;">
            <img src="logo.png" alt="Logo" style="height: 45px; width: auto; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
            <div class="main-title" style="margin: 0;">GESTIÓN DE INVENTARIO</div>
        </div>
        
        <div class="header-inputs">
            <div class="input-group">
                <input type="text" id="bodega" placeholder="Bodega (ej: Porsche)" oninput="guardarMeta()">
                <input type="text" id="site" placeholder="Site (ej: 8401)" oninput="guardarMeta()">
            </div>
            <div class="input-group">
                <input type="date" id="fecha" oninput="guardarMeta()">
                <input type="text" id="responsable" placeholder="Responsable" oninput="guardarMeta()">
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progress-bar">0%</div>
        </div>

        <div class="action-buttons">
            <label for="file-upload" class="btn-import">📂 Cargar Excel del Sistema</label>
            <input type="file" id="file-upload" accept=".xlsx, .xls, .csv" onchange="leerArchivo(this)" style="display:none">
        </div>

        <div class="header-controls" style="display: flex; gap: 10px; justify-content: flex-end; padding: 5px 15px;">
            <button onclick="abrirEscanerBusqueda()" class="btn-control">║▌║█</button>
            <button id="dark-mode-btn" onclick="toggleDarkMode()" class="btn-control">🌙 Dark</button>
        </div>

        <div id="modal-suma" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10001; align-items:center; justify-content:center;">
            <div style="background:white; width:90%; max-width:400px; padding:20px; border-radius:15px; text-align:center;">
                <h3 id="modal-nombre" style="margin-top:0; color: #2c3e50;">Producto</h3>
                <p id="modal-barcode" style="color:#666; font-size:0.8em;"></p>
                <div style="background:#f8f9fa; padding:15px; border-radius:10px; margin:15px 0;">
                    <span style="display:block; font-size:0.9em; color:#888;">Stock Físico Actual:</span>
                    <span id="modal-actual" style="font-size:2em; font-weight:bold; color:#2c3e50;">0</span>
                </div>
                <label style="display:block; margin-bottom:10px; font-weight:bold;">CANTIDAD A AGREGAR:</label>
                <input type="number" id="modal-input-suma" inputmode="decimal" style="width:100%; padding:15px; font-size:1.5em; text-align:center; border:2px solid #3498db; border-radius:10px; margin-bottom:20px;">
                <div style="display:flex; gap:10px;">
                    <button onclick="cerrarModalSuma()" style="flex:1; padding:15px; background:#bdc3c7; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">CANCELAR</button>
                    <button onclick="confirmarSumaModal()" style="flex:1; padding:15px; background:#27ae60; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">SUMAR</button>
                </div>
            </div>
        </div>
    </header>

    <div id="camera-scanner" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:9999;">
        <div id="interactive" class="viewport" style="width:100%; height:80%;"></div>
        <button onclick="cerrarEscaner()" style="width:100%; height:20%; background:red; color:white; font-size:2em; border:none;">CERRAR</button>
    </div>

    <main id="app">
        <div class="search-container">
            <input type="text" id="search" placeholder="🔍 Buscar por Nombre, Código" oninput="filtrarProductos()">
        </div>
        
        <div id="product-list"></div>

        <div class="export-zone">
            <button class="btn-export csv" onclick="exportarExcel()">📊 Exportar Excel</button>
            <button class="btn-export pdf" onclick="exportarPDF()">📄 PDF</button>
        </div>
        <button id="clear-btn" onclick="limpiarTodo()" style="background:#95a5a6; color:white; border:none; padding:12px; width:90%; margin:20px 5%; border-radius:8px; font-weight:bold; cursor:pointer;">🗑️ Borrar Datos Actuales</button>
    </main>

    <div class="footer-total">
        <div class="footer-col">
            <span>FÍSICO:</span>
            <span id="gran-total">$ 0</span>
        </div>
        <div class="footer-col">
            <span id="info-extra-pantalla" style="font-size: 0.7em;">Ajuste: 0%</span>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
